<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — eFootball Tournament</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="navbar">
    <div class="nav-brand">eFootball Tournament</div>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="matches.html">Matches</a></li>
      <li><a href="leaderboard.html" class="active">Leaderboard</a></li>
      <li><a href="results.html">Results</a></li>
    </ul>
  </nav>

  <!-- ===== Leaderboard ===== -->
  <section class="section page-section">
    <div class="container">
      <h2 class="section-title">Leaderboard</h2>
      <p class="section-subtitle">Current tournament standings.</p>

      <div class="table-wrap">
        <table class="leaderboard-table" id="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Team</th>
              <th>P</th>
              <th>W</th>
              <th>D</th>
              <th>L</th>
              <th>Pts</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
      <p class="empty-state" id="leaderboard-empty">Loading leaderboard&hellip;</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 eFootball Tournament. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
